<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Task Counter</h1>
      <p class="subtitle">Track how many times you've completed each task</p>
    </header>

    <section class="add-task-section">
      <h2>Add New Task</h2>
      <form id="add-task-form">
        <div class="form-row">
          <input
            type="text"
            id="task-name"
            placeholder="Task name (e.g. Morning workout)"
            required
            maxlength="100"
          />
          <input
            type="number"
            id="task-target"
            placeholder="Target count"
            min="1"
            max="9999"
            value="10"
            required
          />
          <button type="submit" class="btn btn-primary">+ Add Task</button>
        </div>
      </form>
    </section>

    <section class="tasks-section">
      <div class="tasks-header">
        <h2>Your Tasks</h2>
        <button id="clear-all-btn" class="btn btn-danger-outline" title="Clear all completed tasks">
          Clear Completed
        </button>
      </div>
      <div id="tasks-list" role="list" aria-label="Task list">
        <p class="empty-state" id="empty-state">
          No tasks yet. Add your first task above!
        </p>
      </div>
    </section>
  </div>

  <script src="utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
